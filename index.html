// ─── BONUS MILESTONES ──────────────────────────────────────────────────────────
const BONUSES = [
  { days:90,  label:"3-Month Milestone",    badge:"🎯", amount:1000  },
  { days:180, label:"6-Month Achievement",  badge:"⭐", amount:2000  },
  { days:365, label:"1-Year Anniversary",   badge:"🏆", amount:5000  },
];
const getBonusStatus = (hireDateStr) => {
  if (!hireDateStr) return null;
  const hire      = new Date(hireDateStr + "T12:00:00");
  const today     = new Date();
  const daysSince = Math.floor((today - hire) / 86400000);
  const yearsCompleted = Math.floor(daysSince / 365);
  // Build dynamic bonuses including year 2+ anniversaries
  const allBonuses = [...BONUSES];
  for (let y = 2; y <= yearsCompleted + 1; y++) {
    const amount = 6000 + (y - 2) * 1000; // yr2=$6K, yr3=$7K, yr4=$8K...
    allBonuses.push({ days: y*365, label:`${y}-Year Anniversary`, badge: y===2?"💎":y===3?"🔥":y===4?"👑":"🌟", amount });
  }
  const earned   = allBonuses.filter(b => daysSince >= b.days);
  const next     = allBonuses.find(b => daysSince < b.days);
  return { daysSince, earned, next, daysLeft: next ? next.days - daysSince : 0, yearsCompleted };
};

// Pitched milestone: $2,000 per 100 pitched leads all-time
const getPitchedMilestone = (leads, canvasserName) => {
  const pitched   = (leads||[]).filter(l=>l.fieldMarketer===canvasserName&&(l.outcome==="pitched"||l.outcome==="sold")).length;
  const milestones= Math.floor(pitched/100);
  const earned    = milestones * 2000;
  const toNext    = 100 - (pitched % 100);
  const pct       = (pitched % 100);
  return { pitched, milestones, earned, toNext, pct };
};

// Revenue milestone: $10,000 per $1M in revenue all-time
const getRevenueMilestone = (leads, canvasserName) => {
  const revenue  = (leads||[]).filter(l=>l.fieldMarketer===canvasserName&&l.outcome==="sold").reduce((s,l)=>s+(parseFloat(l.revenue)||0),0);
  const millions = Math.floor(revenue/1000000);
  const earned   = millions * 10000;
  const remaining= 1000000 - (revenue % 1000000);
  const pct      = Math.min((revenue % 1000000)/1000000*100, 100);
  return { revenue, millions, earned, remaining, pct };
};


// Canvasser bonus: 1% of revenue per sale + $70 for 2 PNS/day + $35 per extra PNS same day
const getCanvasserBonus = (leads, canvasserName, fromDate, toDate) => {
  const myLeads = (leads||[]).filter(l => l.fieldMarketer === canvasserName);
  const inRange  = (l) => {
    if (!fromDate) return true;
    const d = l.outcomeDate||l.apptDate||l.createdDate||"";
    return d >= fromDate && d <= toDate;
  };

  // 1% revenue bonus per sale
  const revBonus = myLeads
    .filter(l => l.outcome==="sold" && inRange(l))
    .reduce((s,l) => s + (parseFloat(l.revenue)||0) * 0.01, 0);

  // Daily PNS bonus: $70 at 2 PNS, +$35 per extra
  const pnsByDay = {};
  myLeads.filter(l => l.outcome==="pitched" && inRange(l)).forEach(l => {
    const d = l.outcomeDate||l.apptDate||l.createdDate||"";
    pnsByDay[d] = (pnsByDay[d]||0) + 1;
  });
  let pnsBonus = 0;
  const pnsDays = [];
  Object.entries(pnsByDay).forEach(([date, count]) => {
    if (count >= 2) {
      const bonus = 70 + (count - 2) * 35;
      pnsBonus += bonus;
      pnsDays.push({ date, count, bonus });
    }
  });

  return { revBonus: Math.round(revBonus), pnsBonus, total: Math.round(revBonus) + pnsBonus, pnsDays };
};
const getCloserMonthlyBonus = (monthlyRevenue) => {
  const rev = parseFloat(monthlyRevenue) || 0;
  if (rev < 150000) {
    const remaining = 150000 - rev;
    return { earned: 0, nextAt: 150000, remaining, label: `${fmtK(remaining)} to first bonus` };
  }
  const base    = 2000;
  const above   = rev - 150000;
  const extra   = Math.floor(above / 50000) * 1000;
  const total   = base + extra;
  const nextAt  = 150000 + (Math.floor(above / 50000) + 1) * 50000;
  const remaining = nextAt - rev;
  return { earned: total, nextAt, remaining, label: `${fmtK(remaining)} to next $1K bonus` };
};

// $10K bonus per $1M in total revenue
const getMilestoneBonus = (totalRevenue) => {
  const rev       = parseFloat(totalRevenue)||0;
  const millions  = Math.floor(rev / 1000000);
  const earned    = millions * 10000;
  const nextAt    = (millions + 1) * 1000000;
  const remaining = nextAt - rev;
  const pct       = Math.min((rev % 1000000) / 1000000 * 100, 100);
  return { millions, earned, nextAt, remaining, pct };
};

.inp{background:#f1f5f9;border:2px solid transparent;border-radius:12px;padding:10px 12px;width:100%;font-size:14px;color:#0f172a;outline:none;transition:.2s;font-family:'Nunito',sans-serif;}
.inp:focus{border-color:#f97316;background:#fff;box-shadow:0 0 0 3px rgba(249,115,22,.1);}
.add-btn{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;color:#16a34a;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;}
.add-btn:hover{background:#dcfce7;}
.del-btn{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:14px;padding:6px;border-radius:8px;transition:.15s;}
.del-btn:hover{color:#ef4444;background:#fef2f2;}
.btn-primary{background:linear-gradient(135deg,#f97316,#ea580c);color:#fff;border:none;border-radius:14px;padding:14px 24px;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;font-family:'Nunito',sans-serif;box-shadow:0 4px 14px rgba(249,115,22,.35);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(249,115,22,.45);}
.btn-primary:active{transform:translateY(0);box-shadow:0 2px 8px rgba(249,115,22,.3);}
.w100{width:100%;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.section-lbl{font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.1em;margin-bottom:10px;text-transform:uppercase;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:28px;font-size:13px;font-weight:700;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.2);white-space:nowrap;animation:toastIn .25s cubic-bezier(.34,1.56,.64,1);max-width:88vw;text-align:center;}
.toast-success{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;}
.toast-error{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,12px) scale(.95)}to{opacity:1;transform:translate(-50%,0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
`;
